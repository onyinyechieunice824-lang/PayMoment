
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayMoment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        app: {
                            blue: '#1e3a8a',
                            purple: '#7c3aed',
                        }
                    },
                    screens: {
                        'xs': '375px',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-blue: #1e3a8a;
            --app-purple: #7c3aed;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        ::selection {
            background: var(--app-purple);
            color: white;
        }
        html {
            scroll-behavior: smooth;
        }
        .tap-scale {
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tap-scale:active {
            transform: scale(0.95);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .page-fade-in {
            animation: pageFade 0.4s ease-out forwards;
        }
        @keyframes pageFade {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounceSubtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .animate-bounce-subtle {
            animation: bounceSubtle 2s infinite ease-in-out;
        }

        /* MOBILE DATE INPUT VISIBILITY FIX */
        input[type="date"] { 
            color-scheme: light; 
            position: relative;
            -webkit-appearance: none;
            appearance: none;
            min-height: 52px;
            display: flex;
            align-items: center;
        }
        .dark input[type="date"] { 
            color-scheme: dark; 
        }

        input[type="date"]::-webkit-datetime-edit {
            color: #0f172a !important; 
            opacity: 1 !important;
            display: flex !important;
        }
        .dark input[type="date"]::-webkit-datetime-edit {
            color: #ffffff !important; 
        }

        /* FIXED POSITION FIX FOR IOS */
        .fixed-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100dvh;
            z-index: 500;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
